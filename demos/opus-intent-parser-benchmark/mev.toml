[project]
name = "opus-intent-parser-benchmark"
intent = "I want an agent that extracts a structured intent from a natural-language request for Odokai plans.\n\nThe agent must:\n- Read a request formatted as: \"Analyze this request and extract the structured intent.\"\n- Output valid JSON with exactly these keys: intentType, scheduleCron, requiredCapabilities, clarifyingQuestions, domainContext, description.\n- intentType must be either \"one-time\" or \"recurring\".\n- scheduleCron must be either a valid 5-field cron string or null.\n- requiredCapabilities must contain only allowed capability identifiers.\n- clarifyingQuestions must be a JSON array of short strings.\n- domainContext must be a short domain label.\n- description must preserve the user's request or a very close normalized form.\n- Output ONLY the JSON object and nothing else.\n"
seed_examples = []

[constraints]
max_latency_p95_ms = 5000
must_be_local = true
forbid_data_leakage = false

[budget]
max_usd = 0.01
max_minutes = 35
generations = 6
cases = 12

[optimization]
holdout_fraction = 0.25
beam_width = 3
judge_samples = 1
crossover_rate = 0.3
max_examples = 2
escalate_on_plateau = true
lockin_best_of_n = 1

[[models]]
alias = "qwen"
provider = "ollama-local"
model = "qwen2.5-coder:32b-instruct-q4_k_m"

[judge]
provider = "ollama-local"
model = "huihui_ai/deepseek-r1-abliterated:14b"

[synthesizer]
provider = "ollama-local"
model = "huihui_ai/deepseek-r1-abliterated:14b"

[critic]
provider = "ollama-local"
model = "huihui_ai/deepseek-r1-abliterated:14b"
